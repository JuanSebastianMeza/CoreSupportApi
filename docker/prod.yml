version: "2"

services:

  # Add .env
  nginx_backend:
    image: nginx
    container_name: nginx_backend
    network_mode: "bridge"
    restart: always
    ports: 
      - "8056:80"
    depends_on:
      - app_backend
    # Copy files into container
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/nginx.template
      - ../backend:/backend
    working_dir: /backend
    environment:
      - DOLLAR=$$
      - APP_HOSTNAME=172.31.158.12
    command: /bin/bash -c "envsubst < /etc/nginx/conf.d/nginx.template > /etc/nginx/conf.d/nginx.conf && nginx -g 'daemon off;'"

  app_backend:
    extends:
      file: base.yml
      service: app_backend
    # If there is no image, build one
    build:
      args:
        - DJANGO_ENV=prod
    # Set container name
    container_name: identidad_backend
    network_mode: "bridge"
    restart: always
    # Copy backend folder 
    # environment:
    #   - APP_HOSTNAME=172.31.158.12
    volumes:
      - ../backend:/backend
    # Change workdir
    working_dir: /backend
    command: /bin/bash -c "chmod +x /backend/uwsgi/static.sh; /backend/uwsgi/static.sh; uwsgi --ini /backend/uwsgi/uwsgi.ini"
  
  # Angular frontend app
  app_frontend:
    image: nginx
    # Name the container
    container_name: identidad_frontend
    # Ports to use
    ports: 
      - "8057:80"
    # Folders and files to copy into the container
    volumes:
      # Copy the app to html folder
      - ../dist/:/usr/share/nginx/html
      # Works only with SPA
      - ./nginx-custom.conf:/etc/nginx/conf.d/default.conf
    # Set environment variables
    stdin_open: true
    tty: true
    depends_on:
      - app_backend