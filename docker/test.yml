version: "2"

services:
  core_api_backend:
    extends:
      file: base.yml
      service: core_api_test
    container_name: core_api_backend
    working_dir: /backend/api
    ports:
      - "8101:8000"
    stdin_open: true
    tty: true
    networks:
      - core_api_net
    command: python manage.py runserver 0.0.0.0:8000

  # plantilla_jupyter:
  #   extends:
  #     file: base.yml
  #     service: plantilla_backend_test
  #   container_name: plantilla_jupyter
  #   ports: 
  #     - "8102:8888"
  #   volumes:
  #     - ./jupyter_notebook_config.py:/root/.jupyter/jupyter_notebook_config.py
  #   networks:
  #     - plantilla_net
  #   working_dir: /backend/notebooks
  #   # Run the following command
    # command: python ../api/manage.py shell_plus --notebook

  core_api_frontend:
    image: nginx
    container_name: core_api_frontend
    # Entablish ports
    ports: 
      - "8103:80"
    depends_on:
      - core_api_backend
    volumes:
      - ../dist/:/usr/share/nginx/html
      - ./nginx-custom.conf:/etc/nginx/conf.d/default.conf
    networks:
      - core_api_net
    stdin_open: true
    tty: true

networks:
  core_api_net:
    driver: bridge